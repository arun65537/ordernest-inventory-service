name: Deploy to Render

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create prod profile from secret
        env:
          APPLICATION_PROD_YML: ${{ secrets.APPLICATION_PROD_YML }}
        run: |
          if [ -z "$APPLICATION_PROD_YML" ]; then
            echo "APPLICATION_PROD_YML secret is not set"
            exit 1
          fi
          printf '%s\n' "$APPLICATION_PROD_YML" > src/main/resources/application-prod.yml

      - name: Verify build with prod profile
        run: ./gradlew --no-daemon clean build -x test -Dspring.profiles.active=prod

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing required secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered successfully."
