server:
  port: 8081

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ordernest-inventory-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      security:
        protocol: SSL
      ssl:
        truststore:
          type: PEM
          location: ${user.dir}/src/main/resources/ca.pem
        keystore:
          type: PKCS12
          location: ${user.dir}/src/main/resources/client.keystore.p12
          password: changeit
  datasource:
    hikari:
      max-lifetime: 240000
      idle-timeout: 120000
      keepalive-time: 30000
      connection-timeout: 20000
      validation-timeout: 5000
      maximum-pool-size: 10
      minimum-idle: 1
    url: jdbc:postgresql://localhost:5432/inventory_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      username: default
      password: ""
      timeout: 2s
