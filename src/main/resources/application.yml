spring:
  profiles:
    default: local
  cache:
    type: redis
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  kafka:
    topic:
      order-status-events: order.status.events
    consumer:
      order-status-group-id: ordernest-inventory-service-order-status-consumer
  seed:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
