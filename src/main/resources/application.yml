server:
  port: 8081

spring:
  cache:
    type: redis
  kafka:
    bootstrap-servers: ${KAFKA_SERVICE_URL:kafka-877fe57-ordernest.i.aivencloud.com:14046}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:ordernest-inventory-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      security:
        protocol: ${KAFKA_SECURITY_PROTOCOL:SSL}
      ssl:
        truststore:
          type: PEM
          location: ${KAFKA_TRUSTSTORE_PATH:/app/ssl/ca.pem}
        keystore:
          type: PKCS12
          location: ${KAFKA_KEYSTORE_PATH:/app/ssl/client.keystore.p12}
          password: ${KAFKA_KEYSTORE_PASSWORD:changeit}

  datasource:
    url: jdbc:postgresql://ep-fragrant-unit-ailk0gqi-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

app:
  kafka:
    topic:
      payment-events: ${PAYMENT_EVENTS_TOPIC:payment.events}
      order-cancelled-events: ${ORDER_CANCELLED_EVENTS_TOPIC:order.cancelled.events}
    consumer:
      group-id: ${PAYMENT_EVENTS_CONSUMER_GROUP_ID:ordernest-inventory-service-payment-failed-consumer}
      order-cancelled-group-id: ${ORDER_CANCELLED_EVENTS_CONSUMER_GROUP_ID:ordernest-inventory-service-order-cancelled-consumer}
  seed:
    enabled: true
